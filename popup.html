<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recorder</title>
    <style>
      :root {
        color-scheme: light dark;
      }
      body {
        margin: 0;
        padding: 16px;
        font-family:
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          sans-serif;
        min-width: 360px;
      }
      .container {
        display: grid;
        gap: 8px;
      }
      .status {
        font-size: 12px;
        padding: 8px;
        border-radius: 8px;
        background: rgba(125, 125, 125, 0.15);
      }
      .stats {
        font-size: 12px;
        opacity: 0.9;
      }
      .settings {
        display: grid;
        gap: 6px;
        font-size: 12px;
        padding: 8px;
        border-radius: 8px;
        background: rgba(125, 125, 125, 0.1);
      }
      .settings button {
        width: 100%;
      }
      .controls {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }
      button {
        padding: 8px;
        border-radius: 8px;
        border: 1px solid rgba(125, 125, 125, 0.4);
        cursor: pointer;
        font-weight: 600;
      }
      button:disabled {
        opacity: 0.65;
        cursor: not-allowed;
      }
      .btn-start {
        background: #1f8f4a;
        color: #fff;
        border-color: #1a7c40;
      }
      .btn-stop {
        background: #c7362d;
        color: #fff;
        border-color: #ad3028;
      }
      .btn-export {
        background: #24292f;
        color: #fff;
        border-color: #1d2126;
      }
      .btn-clear {
        background: #fff;
        color: #1f2328;
        border-color: #b9c0c8;
      }
      .btn-settings {
        background: #6b7280;
        color: #fff;
        border-color: #5f6673;
      }
      #message {
        min-height: 18px;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h3>Recorder</h3>
      <div id="status" class="status">Loading...</div>
      <div id="stats" class="stats">Pages: 0 | URLs: 0</div>
      <div class="settings">
        <div class="settings-row" style="display: block">
          <div>Capture mode is configured in full settings.</div>
        </div>
        <div class="settings-row">
          <button id="open-settings-btn" class="btn-settings" type="button">
            Open all settings
          </button>
        </div>
      </div>
      <div class="controls">
        <button id="start-btn" class="btn-start" type="button">Start</button>
        <button id="stop-btn" class="btn-stop" type="button">Stop</button>
        <button id="export-btn" class="btn-export" type="button">Export Session</button>
        <button id="clear-btn" class="btn-clear" type="button">Clear Session Data</button>
      </div>
      <div id="message"></div>
    </div>
    <script type="module" src="/src/popup.ts"></script>
  </body>
</html>
