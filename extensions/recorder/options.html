<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recorder Settings</title>
    <style>
      :root {
        color-scheme: light dark;
      }
      body {
        margin: 0;
        font-family:
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          sans-serif;
        line-height: 1.4;
      }
      main {
        max-width: 560px;
        margin: 0 auto;
        padding: 24px 16px;
      }
      .panel {
        display: grid;
        gap: 12px;
        border: 1px solid rgba(125, 125, 125, 0.3);
        border-radius: 10px;
        padding: 16px;
        margin-bottom: 16px;
      }
      .row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }
      .hint {
        font-size: 12px;
        opacity: 0.85;
      }
      input[type="number"] {
        min-width: 120px;
        padding: 6px;
      }
      #message {
        min-height: 20px;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <main>
      <h2>Recorder Settings</h2>
      <section class="panel">
        <h3>Polling</h3>
        <label class="row">
          <span>Poll interval (ms)</span>
          <input id="poll-interval" type="number" min="100" max="5000" step="50" />
        </label>
        <p class="hint">Each open tab’s content script polls at this interval while recording.</p>
      </section>
      <section class="panel">
        <h3>Storage</h3>
        <label class="row">
          <span>Force stop when Output+ledger ≥ (MB)</span>
          <input id="limit-force-stop-mb" type="number" min="8" max="2048" step="1" />
        </label>
        <label class="row">
          <span>Trim target for stores 2+3 (MB)</span>
          <input id="target-after-cleanup-mb" type="number" min="4" max="1024" step="1" />
        </label>
        <p class="hint">
          Force-stop uses processed snapshots + ledger only. Raw polled HTML is cleared on stop.
          Trim removes oldest snapshots first (Clear → suggestions / Trim old in popup).
        </p>
      </section>
      <div id="message"></div>
    </main>
    <script type="module" src="/src/options.ts"></script>
  </body>
</html>
