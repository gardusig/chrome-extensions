<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recorder</title>
    <style>
      :root {
        color-scheme: light dark;
      }
      body {
        margin: 0;
        padding: 16px;
        font-family:
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          sans-serif;
        min-width: 360px;
      }
      .container {
        display: grid;
        gap: 8px;
      }
      .status {
        font-size: 12px;
        padding: 8px;
        border-radius: 8px;
        background: rgba(125, 125, 125, 0.15);
      }
      .stats {
        font-size: 12px;
        opacity: 0.9;
      }
      .controls {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }
      button {
        padding: 8px;
        border-radius: 8px;
        border: 1px solid rgba(125, 125, 125, 0.4);
        cursor: pointer;
        font-weight: 600;
      }
      button:disabled {
        opacity: 0.65;
        cursor: not-allowed;
      }
      .btn-start {
        background: #1f8f4a;
        color: #fff;
        border-color: #1a7c40;
      }
      .btn-stop {
        background: #c7362d;
        color: #fff;
        border-color: #ad3028;
      }
      .btn-export {
        background: #24292f;
        color: #fff;
        border-color: #1d2126;
      }
      .btn-clear {
        background: #fff;
        color: #1f2328;
        border-color: #b9c0c8;
      }
      .btn-settings {
        background: #6b7280;
        color: #fff;
        border-color: #5f6673;
      }
      #message {
        min-height: 18px;
        font-size: 12px;
      }
      dialog {
        border-radius: 10px;
        border: 1px solid rgba(125, 125, 125, 0.45);
        padding: 16px;
      }
      dialog .dlg-actions {
        display: flex;
        gap: 8px;
        justify-content: flex-end;
        margin-top: 12px;
        flex-wrap: wrap;
      }
      .suggestions {
        margin-top: 10px;
        display: grid;
        gap: 6px;
      }
      .suggestion-btn {
        text-align: left;
        font-weight: 500;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h3>Recorder</h3>
      <div id="status" class="status">Loading...</div>
      <div id="stats" class="stats">Snapshots: 0 | URLs: 0</div>
      <div class="controls">
        <button id="start-btn" class="btn-start" type="button">Start</button>
        <button id="stop-btn" class="btn-stop" type="button">Stop</button>
        <button id="export-btn" class="btn-export" type="button">Export</button>
        <button id="clear-btn" class="btn-clear" type="button">Clear…</button>
        <button
          id="open-settings-btn"
          class="btn-settings"
          type="button"
          style="grid-column: 1 / -1"
        >
          Settings
        </button>
      </div>
      <div id="message"></div>
    </div>
    <dialog id="clear-dialog">
      <p><strong>Clear stored snapshots</strong></p>
      <p style="font-size: 12px; opacity: 0.9">
        <strong>Trim old</strong> deletes oldest snapshots until under the target size from
        Options.<br />
        <strong>Clear all</strong> removes every processed snapshot and the ledger (raw queue is
        already cleared when stopped).
      </p>
      <div id="clear-suggestions" class="suggestions"></div>
      <div class="dlg-actions">
        <button type="button" id="dlg-trim">Trim old</button>
        <button type="button" id="dlg-full">Clear all</button>
        <button type="button" id="dlg-cancel">Cancel</button>
      </div>
    </dialog>
    <script type="module" src="/src/popup.ts"></script>
  </body>
</html>
